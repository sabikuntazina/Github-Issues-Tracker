<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Font INtegration(Poppins & Hind Siliguri) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <!-- tailwind + Daisy UI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script
      script
      src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"
    ></script>

    <!-- font awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- favicon -->
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon" />

    <!-- css style  -->
    <link rel="stylesheet" href="./style.css" />

    <!-- title  -->
    <title>GitHub Issues Tracker</title>
  </head>
  <body class="min-h-screen max-w-md bg-white mx-auto shadow-md">

    <div class="logo w-[200px] mx-auto pt-32">
        <img class="mx-auto" src="./assets/github-logo.png " alt="">
    </div>

    <div class="text-center mt-5">
      <h2 class="text-xl font-bold">GitHub Issues Tracker</h2>
      <p class="text-sm font-semibold text-gray-400">Sign in to manage your issues</p>
    </div>
    <div class="form pt-10">
    <div class="card bg-white w-full max-w-sm shrink-0 mx-auto rounded-2xl">
      <div class="card-body">
        <fieldset class="fieldset">
          <label class="label text-neutral font-bold text-lg">Username</label>
          <input id="input-user-name" type="text" class="input rounded-sm border border-gray-400 w-[100%] mb-6" placeholder="Enter Username"/>
          <label class="label text-neutral font-bold text-lg">Password</label>
          <input id="input-password" maxlength="8" minlength="8" type="password" class="input rounded-sm border border-gray-400 w-[100%] mb-6" placeholder="Enter Password" />
          <div></div>
          <button id="sign-btn" class="btn btn-primary mt-4 rounded-md w-full mb-4">Sign In</button>
        </fieldset>
      </div>
    </div>
    </div>

    <div class="space-y-5 w-11/12 mx-auto text-center">
      <p class="text-gray-500">------------------------OR------------------------</p>
      <p>Demo Credentials:</p>
    </div>
    <div class="space-y-1 mt-5 w-11/12 bg-gray-100/50 py-3 mb-10 mx-auto text-center">
      <p class="text-black"><span class="font-bold">UserName:</span> admin</p>
      <p class="text-black"><span class="font-bold">Password:</span> admin123</p>
    </div>

    <br>
    
    <script src="./script/login.js"></script>
  </body>
</html>
