  <body class="bg-[#f8fafc]">

    <header>
      <div class="navbar bg-base-100 shadow-sm">
  <div class="flex-1">
    <div class="btn btn-ghost text-xl"> 
      <div class="w-10 rounded-full">
        <img class="" src="./assets/github-logo.png" alt=""> 
      </div>
      <h2>GitHub Issues Tracker</h2></div>
  </div>
  <div class="flex gap-2">
    <div class="join">
  <div>
    <label class="input validator join-item">
      <input id="input-search" type="text" placeholder="🔍Search issues..." required />
    </label>
  </div>
  <button id="btn-search" class="btn btn-primary join-item">New Issue</button>
</div>
  </div>
</div>

    </header>



    <div class="w-11/12 mx-auto my-10">
      <section class="w-11/12 mx-auto">
        <div id="tab-container" class="flex gap-4 flex-wrap justify-left bg-[#f8fafc] shadow py-2 px-5">
          <button class="btn btn-primary text-white tab" id="allTab">All</button>
          <button class="btn btn-primary btn-outline tab" id="openTab">
            Open
          </button>
          <button class="btn btn-primary btn-outline tab" id="closedTab">
            Close
          </button>
        </div>
      </section>

      <section  class="w-11/12 mx-auto shadow">
        <div id="issue-section" class=" my-3">

        </div>
        <div
          id="issue-container" 
          class="grid grid-cols-1 md:grid-cols-4 gap-5 bg-white/80 my-10 shadow py-4 px-5"
        >

      <!-- Open the modal using ID.showModal() method -->

<dialog id="my_modal_1" class="modal">
  <div class="modal-box">

   <div id="details-container" class="space-y-5">
    
    </div>
    <div class="modal-action">
      <form method="dialog">
        <!-- if there is a button in form, it will close the modal -->
        <button class="btn btn-primary">Close</button>
      </form>
    </div>
  </div>
